services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: edu_profit
      POSTGRES_USER: edu_profit
      POSTGRES_PASSWORD: local-only-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu_profit"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
