{% extends "base.html" %}
{% block title %}登录 · 培训财务管理{% endblock %}
{% block content %}
<div class="login-layout">
  <section class="login-panel">
    <div class="brand login-brand">
      <span class="brand-mark">财</span>
      <span>培训财务管理</span>
    </div>
    <div class="login-copy">
      <h1>登录系统</h1>
      <p>管理学员缴费、退款和财务凭证。</p>
    </div>
    <form method="post" class="stack-form">
      <label>用户名<input name="username" autocomplete="username" required autofocus></label>
      <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
      <button class="button button-primary button-full" type="submit">登录</button>
    </form>
  </section>
</div>
{% endblock %}
