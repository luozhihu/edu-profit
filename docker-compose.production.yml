services:
  app:
    build: .
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: sqlite:////app/data/edu_profit.db
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
    command:
      - /bin/sh
      - -c
      - /app/.venv/bin/python -m app.bootstrap && exec /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - app_data:/app/data
      - uploads_data:/app/uploads
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  app_data:
  uploads_data:
